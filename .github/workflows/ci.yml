name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t devops-zero:ci .

      - name: Run container
        run: docker run -d --name devops-zero-ci -p 8080:8080 devops-zero:ci

      - name: Wait for app
        run: sleep 5

      - name: Health check
        run: curl -f http://localhost:8080/health
